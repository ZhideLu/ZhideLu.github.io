<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Zhide Lu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Merriweather', serif;
            line-height: 1.6;
            color: #333;
            max-width: 850px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #fcfcfc;
        }
        /* 导航栏样式 */
        header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1.5rem;
        }
        .profile-photo {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #eee;
        }
        .header-text { flex-grow: 1; }
        h1.site-title { font-size: 1.8rem; margin: 0 0 0.5rem 0; color: #111; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .contact-links a { margin-right: 15px; font-weight: bold; font-size: 1.1rem; }
        
        /* Markdown 正文样式优化 */
        .markdown-body h1 { border-bottom: 2px solid #eee; padding-bottom: 0.3rem; margin-top: 2rem; }
        .markdown-body h2 { color: #2c3e50; margin-top: 1.5rem; }
        .markdown-body pre, .markdown-body code { background-color: #f6f8fa; border-radius: 3px; padding: 0.2rem 0.4rem; font-family: monospace; font-size: 0.9em; }
        .markdown-body pre { padding: 16px; overflow: auto; }
        .markdown-body pre code { padding: 0; }
        .markdown-body blockquote { border-left: 4px solid #dfe2e5; padding: 0 1em; color: #6a737d; }
    </style>
</head>
<body>

    <header>
        <img src="{{ site.baseurl }}/zhidelu.jpg" alt="Zhide Lu" class="profile-photo">
        <div class="header-text">
            <h1 class="site-title">Zhide Lu (鲁智德)</h1>
            <div class="contact-links">
                <a href="{{ site.baseurl }}/index.html">Home</a> 
                <a href="{{ site.baseurl }}/notes.html">Research Notes</a>
            </div>
        </div>
    </header>

    <article class="markdown-body">
        {{ content }}
    </article>

</body>
</html>
