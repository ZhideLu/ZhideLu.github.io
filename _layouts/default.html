<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Zhide Lu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: 'Merriweather', serif;
            line-height: 1.8;
            color: #333;
            max-width: 850px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #fcfcfc;
        }
        /* 导航栏样式 */
        header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1.5rem;
        }
        .profile-photo {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #eee;
        }
        .header-text { flex-grow: 1; }
        h1.site-title { font-size: 1.8rem; margin: 0 0 0.5rem 0; color: #111; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .contact-links a { margin-right: 15px; font-weight: bold; font-size: 1.1rem; }
        
        /* Markdown 正文样式优化 */
        .markdown-body { font-size: 1.05rem; }
        .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; line-height: 1.25; }
        .markdown-body p { margin-top: 0; margin-bottom: 16px; }
        /* 避免长公式撑破页面 */
        .MathJax_Display { overflow-x: auto; overflow-y: hidden; }
    </style>
</head>
<body>

    <header>
        <img src="/zhidelu.jpg" alt="Zhide Lu" class="profile-photo" onerror="this.style.display='none'">
        <div class="header-text">
            <h1 class="site-title">Zhide Lu (鲁智德)</h1>
            <div class="contact-links">
                <a href="/index.html">Home</a> 
                <a href="/notes.html">Research Notes</a>
            </div>
        </div>
    </header>

    <article class="markdown-body">
        {{ content }}
    </article>

</body>
</html>
